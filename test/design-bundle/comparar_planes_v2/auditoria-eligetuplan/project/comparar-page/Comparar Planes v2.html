<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans:  ['Poppins', 'system-ui', 'sans-serif'],
          serif: ['Fraunces', 'Georgia', 'serif'],
        },
        colors: {
          'teal':         '#0f514b',
          'teal-deep':    '#092e2a',
          'teal-deeper':  '#06201d',
          'teal-deepest': '#04181a',
          'mint':         '#14dcb4',
          'mint-bright':  '#1ee5be',
          'mint-text':    '#0f9d8a',
          'cream':        '#f5f0e8',
          'paper':        '#fbf8f3',
          'ink':          '#1e2a2a',
          'ink-soft':     '#5a6b6a',
        },
        boxShadow: {
          'mint-glow': '0 14px 30px rgba(20,220,180,0.36)',
        },
        keyframes: {
          'wsp-ping':       { '0%': { transform: 'scale(1)', opacity: '0.55' }, '100%': { transform: 'scale(2)', opacity: '0' } },
          'slide-in-right': { '0%': { transform: 'translateX(100%)' }, '100%': { transform: 'translateX(0)' } },
          'fade-in':        { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
        },
        animation: {
          'fade-in':        'fade-in 0.25s ease-out',
          'slide-in-right': 'slide-in-right 0.3s cubic-bezier(.2,.8,.2,1)',
        },
      },
    },
  };
</script>

<style>
  html { font-family: 'Poppins', system-ui, sans-serif; }
  body { background: #fbf8f3; }
  .serif { font-family: 'Fraunces', Georgia, serif; }
  .text-balance { text-wrap: balance; }
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  /* Custom range thumbs (mint) for price slider */
  .price-range-input {
    position: absolute;
    inset: 0;
    width: 100%;
    background: transparent;
    pointer-events: none;
    -webkit-appearance: none;
    appearance: none;
  }
  .price-range-input::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    pointer-events: auto;
    width: 1.2rem;
    height: 1.2rem;
    border-radius: 9999px;
    border: 3px solid #14dcb4;
    background: #ffffff;
    box-shadow: 0 2px 6px rgba(20,220,180,.4);
    cursor: pointer;
    margin-top: 0;
  }
  .price-range-input::-moz-range-thumb {
    pointer-events: auto;
    width: 1.2rem;
    height: 1.2rem;
    border-radius: 9999px;
    border: 3px solid #14dcb4;
    background: #ffffff;
    box-shadow: 0 2px 6px rgba(20,220,180,.4);
    cursor: pointer;
  }
  .price-range-input::-webkit-slider-runnable-track,
  .price-range-input::-moz-range-track { background: transparent; height: 1.2rem; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>

name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'production/backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: eligetuplan-backend
  REPOSITORY: eligetuplan-repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} ./production/backend
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="^|^SUPABASE_URL=${{ secrets.SUPABASE_URL }}|SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}|ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}|CACHE_FLUSH_TOKEN=${{ secrets.CACHE_FLUSH_TOKEN }}" \
            --cpu=1 \
            --memory=1Gi \
            --min-instances=1 \
            --max-instances=3 \
            --port=8080 \
            --timeout=60

      - name: Show deployment URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed at: $URL"

      - name: Smoke test deployment
        run: |
          URL="${{ steps.url.outputs.url }}"
          echo "Probing $URL/api/v1/health"
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/v1/health" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Backend OK (HTTP $CODE) en intento $i"
              exit 0
            fi
            echo "Intento $i: HTTP $CODE — reintentando en 10s"
            sleep 10
          done
          echo "Backend no respondió 200 después de 6 intentos. Deploy marcado como fallido."
          gcloud run services logs read ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --limit=50
          exit 1
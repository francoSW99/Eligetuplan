name: Sync de datos (tu7 + UF) → Producción

# Cron SEMANAL: refresca planes desde tu7.cl y la UF del día contra la base de
# PRODUCCIÓN (Supabase). Corre TODOS LOS DOMINGOS (requisito del negocio), dos veces:
#   - mañana (~07-08h Chile): corrida principal.
#   - noche  (~22-23h Chile): RED DE SEGURIDAD — si la de la mañana falló (tu7 caído,
#     GitHub saltó el cron), reintenta. El sync es idempotente, así que correr dos veces
#     es inofensivo (si no cambió nada, reporta 0 cambios y no abre issue).
# Los cambios se reflejan sin redeploy: tras el sync se invalida el caché del backend
# (si CACHE_FLUSH_TOKEN está configurado) y el frontend revalida.
#
# Secrets requeridos (GitHub → Settings → Secrets):
#   SUPABASE_URL                  (la de PRODUCCIÓN — ya existe para el deploy)
#   SUPABASE_SERVICE_ROLE_KEY     (la de PRODUCCIÓN — agregar; bypassea RLS)

on:
  schedule:
    - cron: '0 11 * * 0'      # domingo 11:00 UTC ≈ 07-08h Chile — corrida principal
    - cron: '0 2 * * 1'       # lunes 02:00 UTC = domingo ~22-23h Chile — red de seguridad nocturna
  workflow_dispatch: {}        # permite correrlo a mano para probar

permissions:
  contents: read
  issues: write

concurrency:
  group: sync-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r production/backend/requirements.txt

      - name: Correr sync_all.py
        id: sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set +e
          # Reintento: tu7.cl a veces está lento/caído justo en el minuto del cron y
          # tumbaba TODO el sync semanal. Reintentamos hasta 3 veces SOLO si el código
          # es 1 (error real). El sync es idempotente, así que repetir es inofensivo.
          # Código 0 (ok) y 2 (guardarraíl intencional) NO se reintentan.
          attempts=3
          code=1
          for i in $(seq 1 "$attempts"); do
            echo "::group::Intento $i/$attempts de sync_all.py"
            python production/backend/scripts/sync_all.py > summary.json
            code=$?
            echo "intento $i → código $code"
            echo "::endgroup::"
            if [ "$code" != "1" ]; then
              break
            fi
            if [ "$i" -lt "$attempts" ]; then
              echo "⚠️ Código 1 (error, probable tu7.cl caído/lento). Reintento en 90s…"
              sleep 90
            fi
          done
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "----- summary.json (último intento) -----"
          cat summary.json

      - name: Invalidar caché del backend (freshness inmediata)
        if: ${{ steps.sync.outputs.exit_code == '0' }}
        env:
          CACHE_FLUSH_TOKEN: ${{ secrets.CACHE_FLUSH_TOKEN }}
        run: |
          BASE="https://api.elige-tuplan.cl/api/v1"
          if [ -z "$CACHE_FLUSH_TOKEN" ]; then
            echo "⚠️ CACHE_FLUSH_TOKEN no configurado en Secrets; salto la invalidación." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Vaciar los cachés en memoria → el backend re-lee Supabase ya actualizado.
          code=$(curl -s -o /tmp/flush.json -w "%{http_code}" -X POST \
            -H "X-Admin-Token: $CACHE_FLUSH_TOKEN" -d '' --max-time 30 "$BASE/admin/flush-cache")
          echo "flush-cache -> HTTP $code" | tee -a "$GITHUB_STEP_SUMMARY"
          cat /tmp/flush.json 2>/dev/null || true; echo ""
          # Re-calentar los cachés pesados para que el primer usuario no pague el rebuild.
          for ep in "planes?limit=15" "isapres" "prestadores/v2" "zonas"; do
            wc=$(curl -s -o /dev/null -w "%{http_code}" --max-time 40 "$BASE/$ep" || echo "000")
            echo "  warm $ep -> $wc"
          done

      - name: Resumen + aviso
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -s summary.json ]; then
            echo "❌ El script no produjo summary.json (falló antes de imprimir)." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          ok=$(jq -r '.ok'            summary.json)
          aborted=$(jq -r '.aborted'  summary.json)
          reason=$(jq -r '.reason // "—"'        summary.json)
          uf=$(jq -r '.uf // "—"'                summary.json)
          uf_fecha=$(jq -r '.uf_fecha // "—"'    summary.json)
          before=$(jq -r '.total_before // "—"'  summary.json)
          after=$(jq -r '.total_after // "—"'    summary.json)
          add=$(jq -r '.agregados // 0'          summary.json)
          rem=$(jq -r '.quitados // 0'           summary.json)
          cpre=$(jq -r '.cambios_precio // 0'    summary.json)
          cnom=$(jq -r '.cambios_nombre // 0'    summary.json)
          ccob=$(jq -r '.cambios_cobertura // 0' summary.json)
          czon=$(jq -r '.cambios_zona // 0'      summary.json)
          cmod=$(jq -r '.cambios_modalidad // 0' summary.json)
          ejemplos=$(jq -r '.ejemplos[]? | "- " + .' summary.json)

          {
            echo "## Sync de datos — $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Campo | Valor |"
            echo "|---|---|"
            echo "| OK | $ok |"
            echo "| Abortado (guardarraíl) | $aborted |"
            echo "| UF del día | \$$uf ($uf_fecha) |"
            echo "| Planes (antes → después) | $before → $after |"
            echo "| Agregados / Quitados | +$add / -$rem |"
            echo "| Cambios de precio | $cpre |"
            echo "| Cambios de nombre | $cnom |"
            echo "| Cambios de cobertura | $ccob |"
            echo "| Cambios de zona | $czon |"
            echo "| Cambios de modalidad | $cmod |"
            echo "| Motivo | $reason |"
            if [ -n "$ejemplos" ]; then
              echo ""
              echo "### Ejemplos de cambios"
              echo "$ejemplos"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Aviso: abrir issue si abortó el guardarraíl, o si hubo CUALQUIER cambio
          # (altas, bajas, precio, nombre, cobertura, zona o modalidad).
          changed=0
          for n in "$add" "$rem" "$cpre" "$cnom" "$ccob" "$czon" "$cmod"; do
            if [ "$n" != "0" ]; then changed=1; fi
          done
          if [ "$aborted" = "true" ] || [ "$changed" = "1" ]; then
            if [ "$aborted" = "true" ]; then estado="⚠️ ABORTADO"; else estado="✅ cambios aplicados"; fi
            title="[sync-data] $estado — $(date -u +'%Y-%m-%d')"
            body=$(printf '**UF:** $%s (%s)\n**Planes:** %s → %s\n**Altas / Bajas:** +%s / -%s\n**Cambios:** precio %s · nombre %s · cobertura %s · zona %s · modalidad %s\n**Motivo:** %s\n\n**Ejemplos:**\n%s\n\nRun: %s/%s/actions/runs/%s' \
              "$uf" "$uf_fecha" "$before" "$after" "$add" "$rem" "$cpre" "$cnom" "$ccob" "$czon" "$cmod" "$reason" "$ejemplos" \
              "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}")
            printf '%s' "$body" | gh issue create --title "$title" --body-file - || true
          fi

          # Propagar el código de salida del script (2 = guardarraíl, 1 = error).
          # Surface del motivo real como anotación roja para no escarbar en los logs:
          # si dice "403/Forbidden" → tu7.cl bloquea la IP del runner; si "timeout/reset" → transitorio.
          if [ "${{ steps.sync.outputs.exit_code }}" != "0" ]; then
            echo "::error::sync_all.py terminó con código ${{ steps.sync.outputs.exit_code }} — Motivo: $reason"
            echo "sync_all.py terminó con código ${{ steps.sync.outputs.exit_code }} — Motivo: $reason"
            exit 1
          fi
